services:
  postgres_db:
    image: postgres:15-alpine
    container_name: credit_warehouse_postgres
    restart: always
    environment:
      POSTGRES_DB: rating_warehouse       
      POSTGRES_USER: rating_warehouse_user 
      POSTGRES_PASSWORD: your_secure_password
    ports:
      - "5432:5432"
    volumes:
      - ../pg_storage:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rating_warehouse_user -d rating_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
