      type: "str"
      required: true
      allowed_values: ["IFRS","US-GAAP","Local GAAP"]
    - name: "End of business year"
      offset: 1
      type: "str"
      required: true
      allowed_values: ["December","January","February","March","April","May","June","July","August","September","October","November"]
    - name: "Business risk profile"
      offset: 1
      type: "str"
      required: true
      allowed_values: ["AAA","AA+","AA","AA-","A+","A","A-","BBB+","BBB","BBB-","BB+","BB","BB-","B+","B","B-","CCC","CC","C","SD","D"]
