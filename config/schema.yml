cross_validation:
  - rule_type: "equal_lengths"
    fields: ["Industry risk", "Industry risk score", "Industry weight"]
    required: true

tables:
  - anchor_label: "[Scope Credit Metrics]"
    expected_rows: 6
    columns_mapping:
      index_column: "Metric"
      ignore_trailing_after: "Locked"